name: spring-boot-admin-discoveryclient

deployment:
  env:
    SPRING_BOOT_ADMIN_UI_TITLE: Spring Boot Admin - Discovery Client
  server:
    port: 8080
  management:
    port: 8081
  image: spring-boot-admin:discocli
  group: spring-boot-admin
  # Wait for the discovery server to be ready before starting this container.
  # Without this, the Spring context fails on startup because the discovery server
  # is not yet reachable, causing repeated crash-restarts.
  initContainers:
    - name: wait-for-discoveryserver
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - >-
          until wget -q --timeout=5 -O /dev/null
          http://spring-cloud-kubernetes-discoveryserver/actuator/health/readiness;
          do echo "waiting for discovery server..."; sleep 5; done
